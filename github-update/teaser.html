<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Patch Worx — Beta Teaser</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
    #root { position: absolute; inset: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="scenes/QuiltGrid.jsx"></script>
  <script type="text/babel" src="scenes/AppChrome.jsx"></script>
  <script type="text/babel" src="scenes/TabletApp.jsx"></script>
  <script type="text/babel" src="scenes/Devices.jsx"></script>
  <script type="text/babel" src="scenes/Cursor.jsx"></script>
  <script type="text/babel" src="scenes/TextOverlay.jsx"></script>
  <script type="text/babel" src="scenes/Audio.jsx"></script>
  <script type="text/babel" src="scenes/Scene.jsx"></script>

  <script type="text/babel">
    function SeekSpy() {
      const ctx = React.useContext(window.TimelineContext);
      // Use both useEffect AND a ref-assigned direct call so it definitely sticks
      window.__ctx = ctx;
      window.__seek = (t) => { if (ctx.setTime) ctx.setTime(t); };
      window.__pause = () => { if (ctx.setPlaying) ctx.setPlaying(false); };
      window.__play = () => { if (ctx.setPlaying) ctx.setPlaying(true); };
      return null;
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <Stage
        width={STAGE_W}
        height={STAGE_H}
        duration={DURATION}
        background="#F5F6F2"
        persistKey="patchworx-teaser"
        loop={true}
        controls={false}
        fit="cover"
      >
        <Scene />
        <SeekSpy />
      </Stage>
    );
  </script>
</body>
</html>
